        document.getElementById('appDesc').innerHTML = marked.parse(pageData.desc || '');

        window.openLink = function(url) {
            let schemeUrl = url;
            if (url.includes('play.google.com')) schemeUrl = url.replace('https://play.google.com/store/apps/details?id=', 'market://details?id=');
            else if (url.includes('apps.apple.com')) schemeUrl = url.replace('https://', 'itms-apps://');
            else if (url.includes('t.me/')) schemeUrl = 'tg://resolve?domain=' + url.split('t.me/')[1].split('/')[0];
            else if (url.includes('wa.me/')) schemeUrl = 'whatsapp://send?phone=' + url.split('wa.me/')[1].split('?')[0];
            else if (url.includes('snapchat.com/add/')) schemeUrl = 'snapchat://add/' + url.split('add/')[1].split('/')[0];
            else if (url.includes('facebook.com/')) schemeUrl = 'fb://facewebmodal/f?href=' + url;
            else if (url.includes('instagram.com/')) schemeUrl = 'instagram://user?username=' + url.split('instagram.com/')[1].split('/')[0];

            window.location.href = schemeUrl;
            setTimeout(() => { window.open(url, '_blank', 'noopener,noreferrer'); }, 500);
        };

        const container = document.getElementById('buttonsContainer');
        pageData.buttons.forEach((btn) => {
            let bg = btn.bgColor || '#000000';
            let txt = btn.textColor || '#ffffff';
            let imgHtml = btn.image ? '<img src="' + btn.image + '" class="w-12 h-12 object-contain absolute right-4 transition-transform duration-300 group-hover:scale-110 drop-shadow-lg z-10">' : '';

            container.innerHTML += '<button onclick="openLink(\'' + btn.link + '\')" class="group relative w-full flex items-center justify-center px-6 py-4 rounded-2xl border-[3px] transition-all duration-300 transform hover:-translate-y-1 hover:scale-[1.02] active:scale-95 shadow-md hover:shadow-[0_10px_25px_-5px_rgba(0,0,0,0.3)] overflow-hidden" style="background-color: ' + bg + '; color: ' + txt + '; border-color: ' + txt + '40;"><div class="absolute inset-0 bg-white opacity-0 group-hover:opacity-10 transition-opacity duration-300"></div><div class="w-full text-center z-10 font-sans" style="direction: ltr;"><div class="text-[11px] uppercase tracking-[0.2em] leading-none mb-1.5 opacity-80">' + btn.top + '</div><div class="text-xl font-extrabold leading-none tracking-tight">' + btn.main + '</div></div>' + imgHtml + '</button>';
        });
    </script>
