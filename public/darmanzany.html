<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title id="pageTitle">دەرمانزانی</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        @font-face {
            font-family: 'Kosrat';
            src: url('/font/kosrat.ttf') format('truetype');
            font-display: swap;
        }
        body {
            font-family: 'Kosrat', sans-serif;
            -webkit-tap-highlight-color: transparent;
            background-color: #f8fafc;
        }
        .bg-blob { animation: pulse-slow 8s infinite alternate; }
        @keyframes pulse-slow {
            0% { transform: scale(1) translate(0, 0); opacity: 0.3; }
            50% { transform: scale(1.1) translate(20px, -20px); opacity: 0.5; }
            100% { transform: scale(0.9) translate(-20px, 20px); opacity: 0.3; }
        }
        .markdown-content p { margin-bottom: 0.75rem; }
        .markdown-content strong { color: #4f46e5; font-weight: 900; }
        .markdown-content ul { list-style-type: disc; padding-right: 1.5rem; margin-bottom: 1rem; }
    </style>
</head>
<body class="text-slate-800 antialiased relative min-h-screen flex items-center justify-center p-4">

    <div class="fixed inset-0 z-[-1] pointer-events-none overflow-hidden">
        <div class="absolute top-0 right-0 w-96 h-96 bg-indigo-400 rounded-full mix-blend-multiply blur-[100px] opacity-30 bg-blob"></div>
        <div class="absolute bottom-10 left-10 w-80 h-80 bg-blue-400 rounded-full mix-blend-multiply blur-[100px] opacity-30 bg-blob" style="animation-delay: 2s;"></div>
    </div>

    <main class="w-full max-w-lg bg-white/80 backdrop-blur-xl p-8 md:p-12 rounded-[3rem] shadow-2xl border border-slate-100 relative z-10 text-center animate-in zoom-in-95 duration-500">
        
        <div class="relative inline-block mb-6">
            <div class="absolute inset-0 bg-indigo-500 blur-xl opacity-20 rounded-full"></div>
            <img id="appLogo" src="" alt="لۆگۆ" class="w-32 h-32 md:w-40 md:h-40 object-cover rounded-[2rem] shadow-lg relative z-10 mx-auto bg-slate-100">
        </div>

        <h1 id="appTitle" class="text-4xl md:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-l from-indigo-900 to-blue-700 mb-8 tracking-tight"></h1>

        <div class="bg-slate-50/80 border-r-4 border-indigo-500 p-5 rounded-2xl mb-10 text-right shadow-inner">
            <div id="appDesc" class="markdown-content text-slate-700 leading-relaxed text-sm md:text-base"></div>
        </div>

        <div>
            <p class="text-xs font-bold text-slate-400 mb-5">بەردەستە لەم بەستەرانەی خوارەوە:</p>
            <div id="buttonsContainer" class="flex flex-col gap-4"></div>
        </div>
    </main>

    <script>
        // تۆمارکردنی ڤیو
        let stats = JSON.parse(localStorage.getItem('darmanzany_stats')) || { views: 0, clicks: {} };
        stats.views += 1; 
        localStorage.setItem('darmanzany_stats', JSON.stringify(stats));

        // هێنانی داتا
        let pageData = JSON.parse(localStorage.getItem('darmanzany_data')) || { title: "دەرمانزانی", logo: "", desc: "", buttons: [] };

        document.getElementById('pageTitle').innerText = pageData.title;
        document.getElementById('appTitle').innerText = pageData.title;
        document.getElementById('appLogo').src = pageData.logo || 'https://cdn-icons-png.flaticon.com/512/2966/2966327.png';
        document.getElementById('appDesc').innerHTML = marked.parse(pageData.desc);

        window.openLink = function(url, btnIndex) {
            let currentStats = JSON.parse(localStorage.getItem('darmanzany_stats')) || { views: 0, clicks: {} };
            currentStats.clicks[btnIndex] = (currentStats.clicks[btnIndex] || 0) + 1;
            localStorage.setItem('darmanzany_stats', JSON.stringify(currentStats));

            let schemeUrl = url;
            if (url.includes('play.google.com')) schemeUrl = url.replace('https://play.google.com/store/apps/details?id=', 'market://details?id=');
            else if (url.includes('apps.apple.com')) schemeUrl = url.replace('https://', 'itms-apps://');
            else if (url.includes('t.me/')) schemeUrl = `tg://resolve?domain=${url.split('t.me/')[1].split('/')[0]}`;
            else if (url.includes('wa.me/')) schemeUrl = `whatsapp://send?phone=${url.split('wa.me/')[1].split('?')[0]}`;
            else if (url.includes('snapchat.com/add/')) schemeUrl = `snapchat://add/${url.split('add/')[1].split('/')[0]}`;
            else if (url.includes('facebook.com/')) schemeUrl = `fb://facewebmodal/f?href=${url}`;
            else if (url.includes('instagram.com/')) schemeUrl = `instagram://user?username=${url.split('instagram.com/')[1].split('/')[0]}`;

            window.location.href = schemeUrl;
            setTimeout(() => { window.open(url, '_blank', 'noopener,noreferrer'); }, 500);
        };

        const container = document.getElementById('buttonsContainer');
        pageData.buttons.forEach((btn, index) => {
            let bg = btn.bgColor || '#000000';
            let txt = btn.textColor || '#ffffff';
            let imgHtml = btn.image ? `<img src="${btn.image}" class="w-12 h-12 object-contain absolute right-4 transition-transform duration-300 group-hover:scale-110 drop-shadow-lg z-10">` : '';

            // دیزاینی تایبەت بۆ دوگمە (دەق لە ناوەڕاست، وێنە لە ڕاست، لێواردار و ئەنیمەیشن)
            container.innerHTML += `
                <button onclick="openLink('${btn.link}', ${index})" 
                        class="group relative w-full flex items-center justify-center px-6 py-4 rounded-2xl border-[3px] transition-all duration-300 transform hover:-translate-y-1 hover:scale-[1.02] active:scale-95 shadow-md hover:shadow-[0_10px_25px_-5px_rgba(0,0,0,0.3)] overflow-hidden" 
                        style="background-color: ${bg}; color: ${txt}; border-color: ${txt}40;">
                    
                    <!-- ڕووناکی کاتی بردنە سەر (Hover Effect) -->
                    <div class="absolute inset-0 bg-white opacity-0 group-hover:opacity-10 transition-opacity duration-300"></div>
                    
                    <div class="w-full text-center z-10 font-sans" style="direction: ltr;">
                        <div class="text-[11px] uppercase tracking-[0.2em] leading-none mb-1.5 opacity-80">${btn.top}</div>
                        <div class="text-xl font-extrabold leading-none tracking-tight">${btn.main}</div>
                    </div>
                    
                    ${imgHtml}
                </button>
            `;
        });
    </script>
</body>
</html>
