<!DOCTYPE html>
<html lang="ckb" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>دابەزاندنی دەرمانزانی</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            safelist: [
                'flex', 'items-center', 'justify-center', 'gap-3', 'bg-black', 'text-white', 
                'px-6', 'py-3.5', 'rounded-2xl', 'transition-transform', 'hover:scale-105', 
                'active:scale-95', 'drop-shadow-md', 'hover:drop-shadow-lg', 'w-full', 'sm:w-auto',
                'w-7', 'h-7', 'w-8', 'h-8', 'text-left', 'font-sans', 'text-[10px]', 'uppercase', 
                'tracking-wide', 'leading-none', 'mb-1', 'opacity-90', 'text-lg', 'font-semibold',
                'flex-col', 'sm:flex-row', 'gap-4'
            ]
        }
    </script>
    
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* هێنانە ناوەوەی فۆنتە تایبەتەکەی خۆت */
        @font-face {
            font-family: 'Kosrat';
            src: url('/font/kosrat.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        body {
            font-family: 'Kosrat', sans-serif;
            -webkit-tap-highlight-color: transparent;
            background-color: #f8fafc;
        }

        /* جووڵەی باکگراوند */
        .bg-blob {
            animation: pulse-slow 8s infinite alternate;
        }
        @keyframes pulse-slow {
            0% { transform: scale(1) translate(0, 0); opacity: 0.3; }
            50% { transform: scale(1.1) translate(20px, -20px); opacity: 0.5; }
            100% { transform: scale(0.9) translate(-20px, 20px); opacity: 0.3; }
        }
    </style>
</head>

<body class="text-slate-800 antialiased relative min-h-screen flex items-center justify-center overflow-x-hidden p-4">

    <div class="fixed inset-0 z-[-1] pointer-events-none overflow-hidden">
        <div class="absolute top-0 right-0 w-96 h-96 bg-indigo-400 rounded-full mix-blend-multiply filter blur-[100px] opacity-30 bg-blob"></div>
        <div class="absolute bottom-10 left-10 w-80 h-80 bg-blue-400 rounded-full mix-blend-multiply filter blur-[100px] opacity-30 bg-blob" style="animation-delay: 2s;"></div>
    </div>

    <main class="w-full max-w-lg bg-white/80 backdrop-blur-xl p-8 md:p-12 rounded-[3rem] shadow-2xl shadow-indigo-900/10 border border-slate-100 relative z-10 text-center animate-in zoom-in-95 duration-500">
        
        <div class="relative inline-block mb-6">
            <div class="absolute inset-0 bg-indigo-500 blur-xl opacity-20 rounded-full"></div>
            <img src="darman.png" 
                 onerror="this.onerror=null; this.src='https://cdn-icons-png.flaticon.com/512/2966/2966327.png';" 
                 alt="لۆگۆی دەرمانزانی" 
                 class="w-32 h-32 md:w-40 md:h-40 object-cover rounded-[2rem] shadow-lg relative z-10 mx-auto">
        </div>

        <h1 class="text-4xl md:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-l from-indigo-900 to-blue-700 mb-8 tracking-tight">
            دەرمانزانی
        </h1>

        <div class="bg-slate-50/80 border-r-4 border-indigo-500 p-5 md:p-6 rounded-2xl mb-10 text-right shadow-inner">
            <p class="text-slate-600 font-bold leading-relaxed text-sm md:text-base">
                ئەپڵیکەیشنی <span class="text-indigo-600 font-black">(دەرمانزانی)</span>: ڕێبەرێکی زانستیی ئۆفلاینە بۆ خوێندکارانی پزیشکی، کە زانیاریی وردی دەرمانەکانی وەک بڕ، کارکردن و کاریگەرییە لاوەکییەکانی تێدایە.
            </p>
        </div>

        <div>
            <p class="text-xs font-bold text-slate-400 mb-5">لە ئێستادا بەردەستە بۆ بەکارهێنەرانی مۆبایل لە:</p>
            
            <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
                
                <a href="https://play.google.com/store/apps/details?id=com.nmadev.darmanzany" target="_blank" rel="noopener noreferrer" class="flex items-center justify-center gap-3 bg-black text-white px-6 py-3.5 rounded-2xl transition-transform hover:scale-105 active:scale-95 drop-shadow-md hover:drop-shadow-lg w-full sm:w-auto" style="direction: ltr;">
                    <svg class="w-7 h-7" viewBox="0 0 512 512" fill="currentColor">
                        <path d="M325.3 234.3L104.6 13 l280.8 161.2-60.1 60.1zM47 0C34 6.8 25.3 19.2 25.3 35.3v441.3c0 16.1 8.7 28.5 21.7 35.3l256.6-256L47 0zm425.2 225.6l-58.9-34.1-65.7 64.5 65.7 64.5 60.1-34.1c18-14.3 18-46.5-1.2-60.8zM104.6 499l280.8-161.2-60.1-60.1L104.6 499z"/>
                    </svg>
                    <div class="text-left font-sans">
                        <div class="text-[10px] uppercase tracking-wide leading-none mb-1 opacity-90">GET IT ON</div>
                        <div class="text-lg font-semibold leading-none">Google Play</div>
                    </div>
                </a>
                
                <a href="https://darmanzany.com/" target="_blank" rel="noopener noreferrer" class="flex items-center justify-center gap-3 bg-black text-white px-6 py-3.5 rounded-2xl transition-transform hover:scale-105 active:scale-95 drop-shadow-md hover:drop-shadow-lg w-full sm:w-auto" style="direction: ltr;">
                    <svg class="w-8 h-8" viewBox="0 0 384 512" fill="currentColor">
                        <path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.3 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.3zM34.8 42.7C47.2 24.3 69.8 11.2 92.5 10c2.4-1.4 3-1.6 3-1.6-1.5-2.4-2.8-6.1-2.8-10.7 0-38.3 26.2-76.6 68.3-76.6C158.7 6.4 135 20.2 113.8 38.3 92.4 56.4 75 80.5 75 103.5c0 4.1.3 8.3 1.1 11.5 2.1 1 3.5 1.5 3.5 1.5-1.5 2.4-44.8 14.2-44.8-73.8z"/>
                    </svg>
                    <div class="text-left font-sans">
                        <div class="text-[10px] leading-none mb-1 opacity-90">Download on the</div>
                        <div class="text-lg font-semibold leading-none">App Store</div>
                    </div>
                </a>
                
            </div>
        </div>
        
    </main>

    <script>
        lucide.createIcons();
    </script>
</body>

</html>
