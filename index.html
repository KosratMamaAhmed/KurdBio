      /* جێگیرکردنی فۆنت لەسەر ئاستی جیهانی */
      * {
        font-family: 'Noto Sans Arabic', sans-serif !important;
        -webkit-tap-highlight-color: transparent;
      }

      /* ڕێگەدان بە سکرۆڵ و ڕیفڕێش کردنەوە بە پەنجە */
      html, body {
        min-height: 100%;
        width: 100%;
        background-color: #f8fafc;
        overflow-x: hidden;
        overscroll-behavior-y: auto;
      }

      #root {
        min-height: 100%;
        /* بۆشاییە زیادەکانی سەرەوە و خوارەوە سڕانەوە تا هێڵە سپییەکە دروست نەبێت */
      }

    <script>
      // سیستەمی زیرەک بۆ ناسینەوەی وێبگەڕی تۆڕە کۆمەڵایەتییەکان
      (function() {
        var ua = navigator.userAgent || navigator.vendor || window.opera;
        var isInstagram = ua.indexOf('Instagram') > -1;
        var isFacebook = (ua.indexOf('FBAN') > -1) || (ua.indexOf('FBAV') > -1);
        var isTikTok = ua.indexOf('TikTok') > -1 || ua.indexOf('Bytedance') > -1;
        var isSnapchat = ua.indexOf('Snapchat') > -1;
        
        var isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
        var isAndroid = /Android/i.test(ua);

        if (isInstagram || isFacebook || isTikTok || isSnapchat) {
          var currentUrl = window.location.href;
          
          if (isAndroid) {
            // لە ئەندرۆید فۆرسی کرۆم دەکەین بێ کێشە کار دەکات
            setTimeout(function() {
                var intentUrl = 'intent://' + window.location.host + window.location.pathname + window.location.search + '#Intent;scheme=https;package=com.android.chrome;end';
                window.location.href = intentUrl;
            }, 300);
          } else if (isIOS) {
            // لە ئایفۆن هیچ فۆرسێک ناکەین بۆ ئەوەی ئیرۆری (Action cant be completed) نەدات لە تیکتۆک
            console.log("iOS In-App Browser Detected: Waiting for manual user action to prevent white screen crash.");
          }
        }
      })();
    </script>
